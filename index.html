<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GastroMap Bratislava – Najlepšie reštaurácie v centre</title>
  <meta name="description" content="Objavte najlepšie reštaurácie v Bratislave s GastroMap. Slovenská, talianska, ázijská a medzinárodná kuchyňa s rezerváciou online.">
  <meta name="keywords" content="reštaurácie Bratislava, gastronómia, jedlo, rezervácia">
  
  <!-- Fonts: SF Pro via system-ui stack -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
  <!-- Glass Navigation -->
  <nav class="nav-glass" data-aos="fade-down">
    <div class="nav-content">
      <a href="#" class="nav-logo">
        <img src="images/logo.png" alt="GastroMap" class="logo-img">
        <span class="logo-text">GastroMap</span>
      </a>
      
      <div class="nav-links">
        <a href="#home" class="nav-link active" data-i18n="nav_home">Domov</a>
        <a href="#map-section" class="nav-link" data-i18n="nav_map">Mapa</a>
        <a href="#restaurants" class="nav-link" data-i18n="nav_favorites">Obľúbené</a>
        <a href="#" class="nav-link" data-i18n="nav_bookings">Rezervácie</a>
      </div>
      
      <div class="nav-actions">
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="sk">SK</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ru">RU</button>
        </div>
      </div>
      
      <button class="nav-mobile-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Hero Section -->
  <section id="home" class="hero-section">
    <div class="hero-content" data-aos="fade-up" data-aos-delay="100">
      <h1 class="hero-title" data-i18n="hero_title">GastroMap</h1>
      <p class="hero-subtitle" data-i18n="hero_subtitle">Objavte najlepšie reštaurácie v Bratislave</p>
      <a href="#map-section" class="hero-cta" data-i18n="hero_cta">Preskúvať</a>
    </div>
    <div class="hero-scroll">
      <div class="scroll-indicator"></div>
    </div>
  </section>

  <!-- Search & Filter -->
  <section class="search-section" id="search-section">
    <div class="search-container" data-aos="fade-up">
      <div class="search-bar">
        <input type="text" class="search-input" data-i18n-placeholder="search_placeholder" placeholder="Hľadať reštauráciu...">
        <button class="search-btn" data-i18n="search_button">Hľadať</button>
      </div>
      
      <div class="filter-chips">
        <button class="chip active" data-filter="all" data-i18n="filter_all">Všetko</button>
        <button class="chip" data-filter="slovak" data-i18n="filter_slovak">Slovenská</button>
        <button class="chip" data-filter="italian" data-i18n="filter_italian">Talianska</button>
        <button class="chip" data-filter="asian" data-i18n="filter_asian">Ázijská</button>
        <button class="chip" data-filter="international" data-i18n="filter_international">Medzinárodná</button>
      </div>
    </div>
  </section>

  <!-- Map Section -->
  <section id="map-section" class="map-section">
    <div class="map-container" data-aos="zoom-in" data-aos-delay="200">
      <div id="map" class="leaflet-map"></div>
    </div>
  </section>

  <!-- Restaurants Grid -->
  <section id="restaurants" class="restaurants-section">
    <div class="restaurants-container">
      <h2 class="section-title" data-aos="fade-up">Reštaurácie</h2>
      <div class="restaurants-grid" id="restaurants-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- Booking Modal -->
  <div class="modal-overlay" id="booking-modal">
    <div class="modal-content" data-aos="zoom-in">
      <button class="modal-close">&times;</button>
      <h2 class="modal-title" data-i18n="booking_title">Rezervácia</h2>
      <p class="modal-restaurant" id="modal-restaurant-name"></p>
      
      <form class="booking-form" id="booking-form">
        <div class="form-group">
          <label data-i18n="booking_name">Meno</label>
          <input type="text" name="name" required>
        </div>
        <div class="form-group">
          <label data-i18n="booking_email">E-mail</label>
          <input type="email" name="email" required>
        </div>
        <div class="form-group">
          <label data-i18n="booking_phone">Telefón</label>
          <input type="tel" name="phone" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label data-i18n="booking_date">Dátum</label>
            <input type="date" name="date" required>
          </div>
          <div class="form-group">
            <label data-i18n="booking_time">Čas</label>
            <input type="time" name="time" required>
          </div>
        </div>
        <div class="form-group">
          <label data-i18n="booking_guests">Počet osôb</label>
          <select name="guests" required>
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6+">6+</option>
          </select>
        </div>
        <div class="form-group">
          <label data-i18n="booking_notes">Poznámky</label>
          <textarea name="notes" rows="3"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" data-i18n="booking_cancel">Zrušiť</button>
          <button type="submit" class="btn-primary" data-i18n="booking_submit">Potvrdiť</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer-section">
    <div class="footer-content">
      <img src="images/logo.png" alt="GastroMap" class="footer-logo">
      <p class="footer-text">© 2026 GastroMap. <span data-i18n="footer_rights">Všetky práva vyhradené</span>.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
