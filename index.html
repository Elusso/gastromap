<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GastroMap — Najlepšie reštaurácie v Bratislave</title>
  <meta name="description" content="Objavte najlepšie reštaurácie v centre Bratislavy. Mapa, menu, rezervácie, akcie.">
  <meta name="theme-color" content="#C17B4E">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ====== HEADER ====== -->
    <header class="header">
      <div class="header-inner">
        <img src="images/logo.png" alt="GastroMap" class="logo-img" onerror="this.style.display='none'">
        <h1 class="brand">GastroMap</h1>
      </div>
      <div class="lang-switch">
        <button data-lang="sk" class="lang-btn active">SK</button>
        <button data-lang="en" class="lang-btn">EN</button>
        <button data-lang="ru" class="lang-btn">RU</button>
      </div>
    </header>

    <!-- ====== EXPLORE TAB ====== -->
    <section id="explore-tab" class="tab-page active">
      <div class="view-toggle">
        <button id="map-btn" class="view-btn active"><i class="fas fa-map-marker-alt"></i> <span data-i18n="explore.map_view">Mapa</span></button>
        <button id="list-btn" class="view-btn"><i class="fas fa-list"></i> <span data-i18n="explore.list_view">Zoznam</span></button>
      </div>
      <div id="map-container" class="map-container"><div id="map"></div></div>
      <div id="list-container" class="list-container hidden">
        <div class="cuisine-filter" id="cuisine-filter"></div>
        <div id="restaurant-list" class="restaurant-list"></div>
      </div>
    </section>

    <!-- ====== PROMOTIONS TAB ====== -->
    <section id="promotions-tab" class="tab-page hidden">
      <h2 class="page-title" data-i18n="promotions.title">Akcie a Ponuky</h2>
      <div id="promo-list" class="promo-grid"></div>
    </section>

    <!-- ====== NEWS TAB ====== -->
    <section id="news-tab" class="tab-page hidden">
      <h2 class="page-title" data-i18n="news.title">Novinky</h2>
      <div id="news-list" class="news-grid"></div>
    </section>

    <!-- ====== PROFILE TAB ====== -->
    <section id="profile-tab" class="tab-page hidden">
      <div class="profile-header">
        <div class="avatar-circle"><i class="fas fa-user"></i></div>
        <h2 class="profile-name">Ivan Horváth</h2>
        <p class="profile-points"><i class="fas fa-star"></i> <strong id="gm-points">1 250</strong> bodov</p>
      </div>
      <div id="profile-bookings" class="profile-bookings-section"></div>
      <div id="profile-sections" class="profile-sections"></div>
    </section>

    <!-- ====== RESTAURANT DETAIL OVERLAY ====== -->
    <section id="detail-overlay" class="detail-overlay hidden">
      <button class="detail-back" onclick="closeDetail()"><i class="fas fa-arrow-left"></i></button>

      <div class="detail-carousel swiper" id="detail-carousel">
        <div class="swiper-wrapper" id="carousel-slides"></div>
        <div class="swiper-pagination"></div>
      </div>

      <div class="detail-info">
        <h1 id="detail-name"></h1>
        <div class="detail-cuisine-tags" id="detail-cuisine-tags"></div>

        <!-- Rating + Price + Check -->
        <div class="detail-meta-row">
          <span class="meta-stars" id="meta-stars"></span>
          <span class="meta-price" id="meta-price"></span>
          <span class="meta-check" id="meta-check"></span>
        </div>

        <div class="detail-address-row">
          <i class="fas fa-map-pin"></i> <span id="detail-address"></span>
        </div>

        <!-- Route button -->
        <a id="detail-route-btn" class="route-btn" target="_blank">
          <i class="fas fa-directions"></i> <span data-i18n="restaurant.directions">Navigácia</span>
        </a>
      </div>

      <!-- 4 Tabs -->
      <div class="detail-tabs">
        <button class="dtab active" data-dtab="description"><i class="fas fa-info-circle"></i> <span data-i18n="restaurant.description">Popis</span></button>
        <button class="dtab" data-dtab="menu"><i class="fas fa-utensils"></i> <span data-i18n="restaurant.menu">Menu</span></button>
        <button class="dtab" data-dtab="reservation"><i class="fas fa-calendar-check"></i> <span data-i18n="restaurant.reservation">Rezervácia</span></button>
        <button class="dtab" data-dtab="reviews"><i class="fas fa-comment-dots"></i> <span data-i18n="restaurant.reviews">Recenzie</span></button>
      </div>

      <div class="detail-tab-content">
        <div id="dtab-description" class="dtab-panel active"></div>
        <div id="dtab-menu" class="dtab-panel hidden"></div>
        <div id="dtab-reservation" class="dtab-panel hidden">
          <div class="res-form">
            <div class="res-field"><label data-i18n="reservation.date">Dátum</label><input type="date" id="res-date" class="res-input"></div>
            <div class="res-field"><label data-i18n="reservation.time">Čas</label><select id="res-time" class="res-input"></select></div>
            <div class="res-field"><label data-i18n="reservation.guests">Počet hostí</label><select id="res-guests" class="res-input"><option>1</option><option selected>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select></div>
            <button class="btn-book-now" onclick="submitBooking()"><span data-i18n="reservation.confirm">Potvrdiť rezerváciu</span></button>
          </div>
        </div>
        <div id="dtab-reviews" class="dtab-panel hidden"></div>
      </div>
    </section>

    <!-- ====== TOAST ====== -->
    <div id="toast" class="toast hidden"><span id="toast-msg"></span></div>

    <!-- ====== DIAGNOSTIC PANEL ====== -->
    <div id="diag-panel" class="diag-panel">
      <div class="diag-toggle" onclick="toggleDiag()">🔧 Diagnostika</div>
      <div id="diag-results" class="diag-results hidden"></div>
    </div>

    <!-- ====== BOTTOM NAV ====== -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="explore"><i class="fas fa-compass"></i><span data-i18n="nav.explore">Objavovať</span></button>
      <button class="nav-item" data-tab="promotions"><i class="fas fa-star"></i><span data-i18n="nav.promotions">Akcie</span></button>
      <button class="nav-item" data-tab="news"><i class="fas fa-newspaper"></i><span data-i18n="nav.news">Novinky</span></button>
      <button class="nav-item" data-tab="profile"><i class="fas fa-user-circle"></i><span data-i18n="nav.profile">Profil</span></button>
    </nav>
  </div>

  <!-- ====== SCRIPTS ====== -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="mock_data.js"></script>
  <script src="script.js"></script>
</body>
</html>
