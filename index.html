<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GastroMap — Najlepšie reštaurácie v Bratislave</title>
  <meta name="theme-color" content="#C17B4E">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles/main.css?v=5">
  <style>
    /* Quick fixes for tabs */
    .tab-page { display: none; }
    .tab-page.active { display: block; }
    .map-container { display: none; }
    .map-container:not(.hidden) { display: block !important; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-inner">
        <img src="images/logo.png" alt="GastroMap" class="logo-img" onerror="this.style.display='none'">
        <h1 class="brand">GastroMap</h1>
      </div>
      <div class="lang-switch">
        <button data-lang="sk" class="lang-btn active">SK</button>
        <button data-lang="en" class="lang-btn">EN</button>
        <button data-lang="ru" class="lang-btn">RU</button>
      </div>
    </header>

    <section id="explore-tab" class="tab-page active">
      <div class="view-toggle">
        <button id="map-btn" class="view-btn active"><i class="fas fa-map-marker-alt"></i> Mapa</button>
        <button id="list-btn" class="view-btn"><i class="fas fa-list"></i> Zoznam</button>
      </div>
      <div id="map-container" class="map-container"><div id="map"></div></div>
      <div id="list-container" class="list-container">
        <div class="cuisine-filter" id="cuisine-filter"></div>
        <div id="restaurant-list" class="restaurant-list"></div>
      </div>
    </section>
    <section id="promotions-tab" class="tab-page">
      <h2 class="page-title">Akcie a Ponuky</h2>
      <div id="promo-list" class="promo-grid"></div>
    </section>

    <section id="news-tab" class="tab-page">
      <h2 class="page-title">Novinky</h2>
      <div id="news-list" class="news-grid"></div>
    </section>

    <section id="profile-tab" class="tab-page">
      <div class="profile-header">
        <div class="avatar-circle"><i class="fas fa-user"></i></div>
        <h2 class="profile-name">Ivan Horváth</h2>
        <p class="profile-points"><i class="fas fa-star"></i> <strong id="gm-points">1 250</strong> bodov</p>
      </div>
      <div id="profile-bookings" class="profile-bookings-section"></div>
      <div id="profile-sections" class="profile-sections"></div>
    </section>

    <section id="detail-overlay" class="detail-overlay hidden">
      <button class="detail-back" onclick="closeDetail()"><i class="fas fa-arrow-left"></i></button>
      <div class="detail-carousel swiper" id="detail-carousel">
        <div class="swiper-wrapper" id="carousel-slides"></div>
        <div class="swiper-pagination"></div>
      </div>
      <div class="detail-info">
        <h1 id="detail-name"></h1>
        <div class="detail-cuisine-tags" id="detail-cuisine-tags"></div>
        <div class="detail-meta-row">
          <span class="meta-stars" id="meta-stars"></span>
          <span class="meta-price" id="meta-price"></span>
        </div>
        <div class="detail-address-row">
          <i class="fas fa-map-pin"></i> <span id="detail-address"></span>
        </div>
        <a id="detail-route-btn" class="route-btn" target="_blank">
          <i class="fas fa-directions"></i> Navigácia
        </a>
      </div>
      <div class="detail-tabs">
        <button class="dtab active" data-dtab="description"><i class="fas fa-info-circle"></i> Popis</button>
        <button class="dtab" data-dtab="menu"><i class="fas fa-utensils"></i> Menu</button>
        <button class="dtab" data-dtab="reservation"><i class="fas fa-calendar-check"></i> Rezervácia</button>
        <button class="dtab" data-dtab="reviews"><i class="fas fa-comment-dots"></i> Recenzie</button>
      </div>
      <div class="detail-tab-content">
        <div id="dtab-description" class="dtab-panel active"></div>
        <div id="dtab-menu" class="dtab-panel hidden"></div>
        <div id="dtab-reservation" class="dtab-panel hidden">
          <div class="res-form">
            <div class="res-field"><label>Dátum</label><input type="date" id="res-date" class="res-input"></div>
            <div class="res-field"><label>Čas</label><select id="res-time" class="res-input"></select></div>
            <div class="res-field"><label>Počet hostí</label>
              <select id="res-guests" class="res-input">
                <option>1</option><option selected>2</option><option>3</option><option>4</option>
              </select>
            </div>
            <button class="btn-book-now" onclick="submitBooking()">Potvrdiť rezerváciu</button>
          </div>
        </div>
        <div id="dtab-reviews" class="dtab-panel hidden"></div>
      </div>
    </section>

    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="explore"><i class="fas fa-compass"></i><span>Objavovať</span></button>
      <button class="nav-item" data-tab="promotions"><i class="fas fa-star"></i><span>Akcie</span></button>
      <button class="nav-item" data-tab="news"><i class="fas fa-newspaper"></i><span>Novinky</span></button>
      <button class="nav-item" data-tab="profile"><i class="fas fa-user-circle"></i><span>Profil</span></button>
    </nav>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/restaurants.json"></script>
  <script src="data/photos.json"></script>
  <script src="data/translations.json"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
